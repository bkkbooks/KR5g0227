body:
  text: 太玄紫煙三素纏旋九元開道明魔真言有佩我咒名入金門過我酆都永離鬼官三魂通道七魄陰神流精玉輝灌我形魂上開法門飛天法輪催促三界我得至真列名太玄魔王保舉正斗回旋急急如律令七真曰後世之中有遇此經咒者宿有命根玄圖之人當得傳佩勿令輕師慢經自倚才學下愚之者勿傳冥禁不輕慎之慎之七真告訖乃命五帝大魔三界之神自今已去若有道士奉授神咒經歷觀行三界爲一切衆生轉經行道佩服符籙爲一切衆生有灾之日行我之道救濟兆民懸繒幡花轉念真文呼吸神炁佐助道士治病令得無他無他之後十天魔王十方三界一切神明我悉遷汝之位矣七真曰末學道士若佩服此符當一心奉師敬如日月禮敬瞻仰不得妄傳下愚行尸媱亂麤惡兇悖之人此符皆有三萬力士二十萬大神衛護殺鬼生民不可輕易輕泄禍殁七劫永失道真是時五老受命稽首奉持元始說度酆都經
  hash: sha256:764d27ef2c52a08ca33812f520408ba3b2a1b700159c03be12db9b6f7adc8a47
