body:
  text: 太玄紫煙三素纏旋九元開道明魔真言有佩我咒名入金門過我酆都永離鬼官三魂通道七魄陰神流精玉輝灌我形魂上開法門飛天法輪催促三界我得至真列名太玄魔王保舉正斗回旋急急如律令七真曰後世之中有遇此經咒者宿有命根玄圖之人當得傳佩勿令輕師慢經自倚才學下愚之者勿傳冥禁不輕慎之慎之七真告訖乃命五帝大魔三界之神自今已去若有道士奉授神咒經歷觀行三界為一切衆生轉經行道佩服符籙為一切衆生有災之日行我之道救濟兆民懸繒幡花轉念真文呼吸神氣佐助道士治病令得無他無他之後十天魔王十方三界一切神明我悉遷汝之位矣七真曰末學道士若佩服此符當一心奉師敬如日月禮敬瞻仰不得妄傳下愚行尸媱亂粗惡凶悖之人此符皆有三萬力士二十萬大神衛護殺鬼生民不可輕易輕泄禍殁七劫永失道真是時五老受命稽首奉持元始説度酆都經
  hash: sha256:0b7384a67d7f664653aa290c1ef71862f727854ac79b93e3c26216514a732ac9
