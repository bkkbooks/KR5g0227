front:
  text: 元始説度酆都經爾時元始天尊告五老上皇及諸靈嶽諸方八萬億兆土皇元王太一真君二十四治陰官三官北府三宫九府之曹主知生死之案所受苦樂報對如聲應響倚伏如是今為一切衆生故説七元真經出法度人建立璇璣周行三界總三百六十五度下應地𢴰青黃赤白紫絳已為天地立七元精象置二十八宿日月為之陰陽立二十四曹皆主人間罪福輕重禁戒今為末學道士説令一切衆生咸得安樂永離酆都脫免下鬼拘縶之苦也爾時天尊告北陰大帝七真曰今世人生閻浮地皆稟日月陰陽王氣所養命係七元氣係三十六曹五臟係屬五帝六𦛒係屬六官皆有邪穢故為下鬼所亂元精清氣不能降令人民凶逆不忠不孝不義不慈不仁不敬三光星辰命夭之後皆入酆都為罪鬼死魂不散結聚惡氣衝上天宫太上愍之令告丹誠為一切衆生説演七元真經出法立符度脫凡迷施建功德若有道士三界之中能於末劫天地將壞人民呼嗌風雨不時天下逆亂疫病殺人時得三洞道士持經遊行中國為一切人作齋建立七元道場然燈行道拜奏章表佩服符籙醮謁上皇太真九清道主三五之君五帝玉皇元尊三界官屬咸皆證録得過八難名刻金簡得道之仙矣七真曰若來世有道士志慕仙品或居山谷或居朝市遇有災難刀兵水火疫每兆民死傷能為發心燒香然燈行道一七二七三七四十九日日夜然燈召我七真衛靈大神建北帝七元消災寶齋啓謝北陰削落死籍度却酆都永離鬼官可以白素七尺書此神符一道齋畢送以青囊盛龍函中投北名山中當為過酆都二十四獄不為地官所糾凡道士欲求諸法不受此符鬼神不畏神靈不降為之得罪名係酆都曹府為下鬼所縶也七真曰若有道士志奉我法可得度世名入仙籙真人可為世之良師遇世衰泰之期可得行世救化一切衆生令合吾道昔北方天中太微上帝告我令救天下兆民有災之日列我之位建大七元燈一日三時行道轉經誦念北極殺鬼天蓬神咒鳴鼓啓建吏兵乃降靈官召十天魔王收鬼治病佐天正氣扶助國民佩服神符鎮五方斷截精鬼扣震鐘磬行道四十九轉我當領北方精騎玄斗大神衛靈大神五丁大神黑殺大神威劔萬丈大神王三十六天天蓬大將五湖大神斗中使者三天真君元精大神王黑衣神君天綱直符各三十萬衆一時圍繞下降道場拂掃妖精千鬼萬神斥逐斬截上張天綱下布星綱護助道士行世救治兆民了達一切法成就無上道功感於我矣七真曰大帝圖籙酆都所部凡道士佩太上神咒豁落經籙者不得妙源未佩真經酆都大符修道不成神靈不助若有道士欲受神咒經者齎以白素四十尺紫紋一匹香油米麵朱砂紙墨諸師奉受告啓丹誠書寫經籙於靜室之中傳受勿令露泄醮謁上皇太真九極真君三清道主五帝之神酆都使者列醮三十六盤錢馬續命祕而傳之乃説度酆都咒曰
